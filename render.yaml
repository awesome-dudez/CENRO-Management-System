# Render Blueprint: Django 5 + PostgreSQL
# Connect this repo in Render; it will create the web service and database.

databases:
  - name: cenro_db
    databaseName: cenro_management
    plan: free

services:
  - type: web
    runtime: python
    name: cenro-management
    buildCommand: bash build.sh
    startCommand: gunicorn cenro_mgmt.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cenro_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://cenro-management-7.onrender.com"
      - key: DEBUG
        value: "False"
      # Serve /media/ via Django (required on Render unless you use S3/nginx for uploads).
      - key: SERVE_MEDIA
        value: "true"
      # Optional: persistent uploads — mount a Render Disk (paid plans), then set e.g.
      # MEDIA_ROOT=/var/media to match the mount path so files survive redeploys.
      # - key: MEDIA_ROOT
      #   value: "/var/media"
