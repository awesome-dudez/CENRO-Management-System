{% extends "base.html" %}
{% block title %}Compute Fee{% endblock %}
{% block content %}
<div class="container">
    <h1>Compute Fee</h1>
    <div class="form-card">
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Fee Amount (₱)</label>
                <input type="number" name="fee_amount" step="0.01" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Notes</label>
                <textarea name="fee_notes" class="form-control" rows="3"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Compute Fee</button>
        </form>
    </div>
</div>
{% endblock %}
