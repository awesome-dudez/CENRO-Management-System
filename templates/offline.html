<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - CENRO Sanitary Management System</title>
    <style>
        body { font-family: "Segoe UI", sans-serif; background: #f5f7f6; color: #1f2f28; margin: 0; }
        .wrap { max-width: 680px; margin: 80px auto; padding: 24px; }
        .card { background: #fff; border: 1px solid #dce6e1; border-radius: 12px; padding: 28px; box-shadow: 0 8px 24px rgba(0,0,0,.06); }
        h1 { margin: 0 0 10px; font-size: 28px; color: #1e7a4d; }
        p { margin: 8px 0; line-height: 1.5; }
        .hint { margin-top: 14px; padding: 10px 12px; border-left: 4px solid #1abc9c; background: #eef9f4; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <h1>CENRO Sanitary Management System</h1>
            <p>You are currently offline.</p>
            <p>Pages you already opened remain available. New form submissions will be queued and sent automatically once your connection is back.</p>
            <div class="hint">Tip: Keep this tab open. The system syncs pending data and files as soon as internet is available.</div>
        </div>
    </div>
</body>
</html>
